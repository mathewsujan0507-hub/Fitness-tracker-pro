<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack Pro - Session</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar">
    <h2 class="logo">FitTrack Pro</h2>

    <ul class="nav-links">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="planner.html">Planner</a></li>
        <li><a href="library.html">Library</a></li>
        <li><a href="session.html">Session</a></li>
        <li><a href="progress.html">Progress</a></li>
        <li><a href="history.html">History</a></li>
        <li><a href="settings.html">Settings</a></li>
        <li><span id="navUserChip" class="user-chip hidden"></span></li>
        <li><a id="navLogin" href="login.html" class="hidden">Login</a></li>
        <li><a id="navSignup" href="signup.html" class="hidden">Sign Up</a></li>
        <li><a id="navLogout" href="#" class="hidden">Logout</a></li>
    </ul>

    <button id="darkToggle">🌙</button>
</nav>

<div class="page-content">

<h1>Workout Session</h1>

<div class="session-box">

    <h2 id="sessionPlanName">No plan selected</h2>

    <p id="sessionPhase">Idle</p>

    <h3 id="sessionExerciseName"></h3>
    <p id="sessionExerciseDescription"></p>

    <div class="session-anim-wrap">
        <video id="exerciseVideo" autoplay loop muted playsinline style="width: 280px; height: 280px; margin: 0 auto; display: block; border-radius: 12px; object-fit: cover; background: #181818;">
            <source src="" type="video/mp4">
        </video>
    </div>

    <div class="timer" id="timer">00:00</div>

    <p id="sessionMeta"></p>

    <div id="extraRestControls" class="hidden">
        <p>Need extra time for this set?</p>
        <button id="extraRestYes" type="button">Yes</button>
        <button id="extraRestNo" type="button">Next</button>
    </div>

    <div class="session-controls">
        <button id="btnStart" onclick="startWorkout()">Start</button>
        <button id="btnPause" class="hidden" onclick="togglePause()">Pause</button>
        <button id="btnSkip" class="hidden" onclick="skipPhase()">Skip (Done)</button>
        <button id="btnStop" class="hidden" onclick="stopWorkout()">Stop</button>
    </div>

</div>

</div>

<script src="js/main.js"></script>
<script src="js/auth.js"></script>
<script src="js/session.js"></script>

</body>
</html>
