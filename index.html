<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FitTrack Pro - Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

    <h2 class="logo">FitTrack Pro</h2>

    <ul class="nav-links">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="planner.html">Planner</a></li>
        <li><a href="library.html">Library</a></li>
        <li><a href="session.html">Session</a></li>
        <li><a href="progress.html">Progress</a></li>
        <li><a href="history.html">History</a></li>
        <li><a href="settings.html">Settings</a></li>
    </ul>

    <button id="darkToggle">🌙</button>

</nav>

<!-- PAGE CONTENT -->
<div class="page-content">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Workouts</h3>
<p id="totalWorkouts">0</p>
</div>

<div class="card">
<h3>Calories Burned</h3>
<p id="calories">0</p>
</div>

<div class="card">
<h3>Total Time</h3>
<p id="totalTime">0 min</p>
</div>

<div class="card">
<h3>Weekly Streak</h3>
<p id="streak">0</p>
</div>

</div>

<!-- WATER TRACKER -->
<div class="card tracker">
<h3>Water Intake</h3>
<label for="waterInput">Water (ml)</label>
<input id="waterInput" type="number" min="0" step="50" placeholder="e.g. 250">
<button onclick="saveWater()">Save</button>
<p id="waterDisplay"></p>
</div>

<!-- STEPS TRACKER -->
<div class="card tracker">
<h3>Steps Tracker</h3>
<label for="stepsInput">Steps</label>
<input id="stepsInput" type="number" min="0" step="100" placeholder="e.g. 5000">
<button onclick="saveSteps()">Save</button>
<p id="stepsDisplay"></p>
</div>

</div>

<!-- FLOATING MUSIC BUTTON -->
<a href="https://open.spotify.com/" target="_blank" class="music-float">🎧</a>

<!-- SCRIPTS -->
<script src="js/main.js"></script>
<script src="js/dashboard.js"></script>

<!-- SERVICE WORKER -->
<script>
if("serviceWorker" in navigator){
 navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
