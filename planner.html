<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack Pro - Planner</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar">
    <h2 class="logo">FitTrack Pro</h2>

    <ul class="nav-links">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="planner.html">Planner</a></li>

    <button id="darkToggle">🌙</button>

<div class="page-content">

<h1>Workout Planner</h1>

<div class="planner-form">
    <button id="openPlanSelector">Choose Plan from Library</button>
    <div id="plannerPicker" class="planner-picker hidden">
        <label for="plannerWorkoutSelect">Workout type</label>
        <select id="plannerWorkoutSelect"></select>

        <label for="plannerLevelSelect">Level</label>
        <select id="plannerLevelSelect">
            <option value="beginner">Beginner</option>
            <option value="advanced">Advanced</option>
        </select>

        <button id="addSelectedPlan" type="button">Add Selected Plan</button>
    </div>
</div>

<div id="plansList"></div>

</div>

<!-- Scripts -->
<script src="js/main.js"></script>
<script src="js/library.js"></script>
<script src="js/planner.js"></script>
