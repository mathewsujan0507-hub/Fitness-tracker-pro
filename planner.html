<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack Pro - Planner</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar">
    <h2 class="logo">FitTrack Pro</h2>

    <ul class="nav-links">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="planner.html">Planner</a></li>
        <li><a href="library.html">Library</a></li>
        <li><a href="session.html">Session</a></li>
        <li><a href="progress.html">Progress</a></li>
        <li><a href="history.html">History</a></li>
        <li><a href="settings.html">Settings</a></li>
    </ul>

    <button id="darkToggle">🌙</button>
</nav>

<div class="page-content">

<h1>Workout Planner</h1>

<div class="planner-form">
    <button id="openPlanSelector">Choose Plan from Library</button>
</div>

<div id="plansList"></div>

<!-- Plan selection modal -->
<div id="planOverlay" class="plan-overlay hidden">
    <div class="plan-modal">
        <h2>Select a workout plan</h2>

        <div id="modalStepWorkouts" class="modal-step">
            <p class="card-subtitle">First choose the muscle group you want to train.</p>
            <div id="modalWorkoutList" class="modal-workout-list"></div>
        </div>

        <div id="modalStepLevels" class="modal-step hidden">
            <button id="modalBackToWorkouts" type="button">← Back</button>
            <h3 id="selectedWorkoutTitle"></h3>
            <p class="card-subtitle">Now choose your level:</p>
            <div class="modal-level-buttons">
                <button id="modalBeginnerButton" type="button">Beginner</button>
                <button id="modalAdvancedButton" type="button">Advanced</button>
            </div>
        </div>

        <button id="closePlanModal" type="button">Close</button>
    </div>
</div>

</div>

<!-- Scripts -->
<script src="js/main.js"></script>
<script src="js/library.js"></script>
<script src="js/planner.js"></script>

</body>
</html>
